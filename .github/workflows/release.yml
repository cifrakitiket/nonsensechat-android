name: Android CI/CD Release

on:
  push:
    tags:
      - 'v*' # Робот сработает только тогда, когда вы создадите тег, начинающийся с буквы v (например, v1.0.1)

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        distribution: 'zulu'
        java-version: '17'

    - name: Grant execute permission for gradlew
      run: chmod +x ./gradlew

    - name: Build Release APK
      run: ./gradlew assembleRelease

    - name: Create GitHub Release
      uses: softprops/action-gh-release@v2
      with:
        files: app/build/outputs/apk/release/app-debug.apk # Путь к собранному APK
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
