name: Android CI/CD Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    runs-on: ubuntu-latest
    
    # Явно даем права на запись релизов внутри самого скрипта
    permissions:
      contents: write

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        distribution: 'zulu'
        java-version: '17'

    - name: Grant execute permission for gradlew
      run: chmod +x ./gradlew

    - name: Build APK
      run: ./gradlew assembleDebug # Меняем на debug, чтобы точно собралось без настройки ключей подписи

    - name: Create GitHub Release
      uses: softprops/action-gh-release@v2
      with:
        files: app/build/outputs/apk/debug/app-debug.apk # Указываем точный путь к debug-версии
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
